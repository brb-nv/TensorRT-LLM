# Round 9 (2026-05-22) verification: disaggregated gen with KV cache reuse
# ON, identical to round 7 gen (si1 baseline) except for one added field:
# `max_attention_window: [128, 131072]` in kv_cache_config.
#
# Paired with:
#   - configs_0522/round9/repro_disagg_ctx_tp1.yaml (reuse=true on ctx, same window)
#   - configs_0522/round9/repro_agg_tp1_eagle3.yaml (reuse=true on agg, same window)
#
# See companion config repro_disagg_ctx_tp1.yaml for the full hypothesis
# and verified result summary. Short version: setting
# `max_attention_window: [128, 131072]` on GPT-OSS (which has hybrid
# attention: sliding window 128 + full attention 131072) splits the
# WindowBlockManager into TWO pools, which fires the `poolNum > 1`
# short-circuit in cacheFormatter::getBlockRangeForSending and bypasses
# the slow ctx-side radix walk that was costing +40 ms p50 TTFT in round 7.
#
# What to grep in ctx.log after the run (instrumentation already committed
# in 614ee22a8c, see cacheFormatter.cpp + kvCacheManager.cpp):
#
#   # path selection per request (expect br_path=fallback_all_ids for all):
#   grep -oE 'br_path=[a-z_]+' .../ctx.log | sort | uniq -c
#
#   # pool count (expect pools=2 instead of pools=1 in r7):
#   grep -oE 'pools=[0-9]+' .../ctx.log | sort | uniq -c
#
#   # per-request KV transfer timing (compare against round 7b si1 baseline):
#   grep '\[disagg-prof\] format ctx_req' .../ctx.log | head
#
# Used by: scripts/launch_disagg.sh when
#   CONFIG_DIR=configs_0522/round8
#   GEN_CONFIG_BASE=repro_disagg_gen_tp1_pp4_si1
#   CTX_CONFIG_BASE=repro_disagg_ctx_tp1
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 512
max_seq_len: 131072
stream_interval: 1
trust_remote_code: true
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 4
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: true       # <-- round9: reuse ON on gen (back to round7 baseline; only diff vs round7 is the explicit max_attention_window below)
  # See repro_agg_tp1_eagle3.yaml for why [128, 131072] (not the
  # [128, 32768] value used by the GSM8K integration test at
  # tests/integration/defs/accuracy/test_disaggregated_serving.py:1420).
  # NEW in round9 (vs round8): explicitly set instead of relying on model default.
  max_attention_window: [128, 131072]
moe_config:
  backend: TRTLLM
cuda_graph_config:
  enable_padding: true
  batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128
cache_transceiver_config:
  max_tokens_in_buffer: 131072
  backend: DEFAULT
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 3
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
print_iter_log: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

# Round 9 (2026-05-22) verification config: aggregated TP1 IFB Eagle3 with
# KV cache reuse ON, identical to round 7 agg except for one added field:
# `max_attention_window: [128, 131072]` in kv_cache_config.
#
# Background: round 7 disagg was +40 ms p50 slower than round 7 agg on
# multi-turn RWLT (gpt-oss-120b). Round 7b instrumentation localized
# >99% of the gap to a single ctx-side call:
#   KVCacheManager::findBlocksInReuseTreeByBlockKey
# reached through the `br_path=reuse_tree` branch of
# `getBlockRangeForSending` in cacheFormatter.cpp. That branch is taken
# whenever `pools == 1` AND reuse is enabled.
#
# GPT-OSS has hybrid attention (sliding window 128 + full 131072), so it
# SHOULD have `pools=2`. Without explicit `max_attention_window`, the
# KVCacheManager defaults to a single window and collapses both layer
# types into `pools=1`, triggering the slow path.
#
# Round 9 tests the hypothesis: setting `max_attention_window: [128, 131072]`
# alone (no code changes) should flip ctx to `br_path=fallback_all_ids`
# (bypassing the hot function) AND halve KV cache memory (sliding-window
# layer only needs 5 blocks vs the wasteful 300 blocks under pools=1).
#
# Expected outcome vs round 7 agg:
#   - This config's TTFT should be within noise of round 7 agg (~180 ms p50).
#   - Round 9 disagg TTFT should be SIGNIFICANTLY better than round 7 disagg.
#   - Round 9 disagg vs round 9 agg should be NEGATIVE (disagg wins).
#
# Verified result (n=318): agg p50 183.4 ms; disagg p50 136.6 ms;
# delta p50 -46.7 ms (disagg faster); ctx br_path=fallback_all_ids 318/318.
#   - If the gap is meaningfully larger than that, there's still a
#     disagg-specific bookkeeping cost beyond the radix-tree walk.
#
# Used by: scripts/launch_agg.sh
backend: pytorch
tensor_parallel_size: 1
moe_expert_parallel_size: 1
pipeline_parallel_size: 1
enable_attention_dp: false
stream_interval: 20
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
cuda_graph_config:
  enable_padding: true
  max_batch_size: 1
kv_cache_config:
  dtype: fp8
  enable_block_reuse: true       # <-- round9: reuse ON on agg (back to round7 baseline behavior; only diff vs round7 is the explicit max_attention_window below)
  free_gpu_memory_fraction: 0.9
  event_buffer_max_size: 16384
  # GPT-OSS has alternating layer types: a short-window attention layer
  # (window=128) and a full-attention layer. max_attention_window applies
  # per-layer-type in declaration order. The reference in
  # tests/integration/defs/accuracy/test_disaggregated_serving.py:1420 uses
  # [128, 32768] but that's sized for the GSM8K integration test's shorter
  # context. For our RWLT workload (max_seq_len=131072, prompts reaching
  # ~80k tokens) the full-attention window must match max_seq_len so the
  # full-attention layers can actually see the entire conversation prefix.
  # NEW in round9 (vs round8): explicitly set instead of relying on model default.
  max_attention_window: [128, 131072]
moe_config:
  backend: TRTLLM
max_seq_len: 131072
max_batch_size: 1
max_num_tokens: 20000
num_postprocess_workers: 4
print_iter_log: true
enable_chunked_prefill: true
trust_remote_code: true
sampler_type: TorchSampler
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 3
  # Cookbook "Eagle3-next" = released nvidia/gpt-oss-120b-Eagle3-v3.
  # launch_agg.sh substitutes EAGLE_CKPT here.
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

# Round 8 (2026-05-22) ablation: KV cache reuse OFF on BOTH ctx and gen.
#
# Paired with:
#   - configs_0522/round8/repro_disagg_ctx_tp1.yaml (reuse=false on ctx)
#   - configs_0522/round8/repro_agg_tp1_eagle3.yaml (reuse=false on agg for
#     the apples-to-apples comparator)
#
# Difference vs round7 repro_disagg_gen_tp1_pp4_si1_no_reuse: that round-7
# config disabled reuse only on gen and kept ctx reuse=true, which still
# fired the slow findBlocksInReuseTreeByBlockKey radix walk on ctx (the
# gen always populated lastBlockKey regardless of its own reuse setting).
# Round 8 disables reuse on BOTH sides so cacheFormatter::
# getBlockRangeForSending takes the fallback_all_ids branch entirely.
#
# What to grep in ctx.log after the run (instrumentation already committed
# in 614ee22a8c, see cacheFormatter.cpp + kvCacheManager.cpp):
#
#   # path selection per request (expect br_path=fallback_all_ids for all):
#   grep -oE 'br_path=[a-z_]+' .../ctx.log | sort | uniq -c
#
#   # radix-walk canary (expect 0 occurrences for all real requests):
#   grep -c 'findBlocksInReuseTreeByBlockKey path=slow_blockkey_walk' .../ctx.log
#
#   # per-request KV transfer timing (compare against round 7b si1 baseline):
#   grep '\[disagg-prof\] format ctx_req' .../ctx.log | head
#
# Used by: scripts/launch_disagg.sh when
#   CONFIG_DIR=configs_0522/round8
#   GEN_CONFIG_BASE=repro_disagg_gen_tp1_pp4_si1
#   CTX_CONFIG_BASE=repro_disagg_ctx_tp1
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 512
max_seq_len: 131072
stream_interval: 1
trust_remote_code: true
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 4
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: false      # <-- round8 ablation: reuse OFF on gen
moe_config:
  backend: TRTLLM
cuda_graph_config:
  enable_padding: true
  batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128
cache_transceiver_config:
  max_tokens_in_buffer: 131072
  backend: DEFAULT
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 3
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
print_iter_log: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

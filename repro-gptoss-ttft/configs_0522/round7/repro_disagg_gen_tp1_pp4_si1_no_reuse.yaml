# Round 7 (2026-05-22) ablation A: gen-side block reuse OFF.
#
# Hypothesis (round7): the disagg `kv_xfer_ms` floor grows with
# `num_reused_blocks` (the conversation prefix already cached on gen) and is
# uncorrelated with `num_new_allocated_blocks` (= bytes actually transferred).
# See FINDINGS_RWLT_0522.md "Hypothesis" section for the round5/round6 pooled
# and per-trajectory correlations that motivate this.
#
# Direct test: disable gen-side prefix reuse only. Every turn must arrive at
# gen with `num_reused_blocks == 0`, so ctx is forced to (a) compute and
# (b) transfer the entire prefix every turn. Two interpretive cases:
#
#   (case A) `kv_xfer_ms` becomes a linear function of bytes-on-the-wire
#       (`new_blk` >> 0 for every turn). Then the round6_si1 floor was
#       gen-side bookkeeping over the cached prefix on the GEN worker, NOT
#       ctx-side. Action: instrument the GEN kv_cache_manager block-lookup /
#       block-table-update path.
#
#   (case B) `kv_xfer_ms` is still high and STILL correlates with
#       `reused_tok` from rwlt (not from kv_cache_metrics, which will now
#       always be 0). Then the slowdown is ctx-side block-list construction
#       walking the full conversation prefix even when most blocks are
#       already cached on gen. Action: instrument
#       `sendRequestInfo()` / `getBlockRangeForReceiving()` in
#       dataTransceiver.cpp.
#
# Note: ctx config (configs_0522/round7/repro_disagg_ctx_tp1.yaml) is
# UNCHANGED -- ctx keeps its own prefix cache so it doesn't have to re-prefill
# from scratch every turn. This means ctx_prefill stays cheap; only the
# gen-side handoff bookkeeping changes.
#
# Used by: scripts/launch_disagg.sh when
#   GEN_CONFIG_BASE=repro_disagg_gen_tp1_pp4_si1_no_reuse
#   CTX_CONFIG_BASE=repro_disagg_ctx_tp1
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 512
max_seq_len: 131072
stream_interval: 1
trust_remote_code: true
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 4
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: false      # <-- the only knob change vs si1 reference
moe_config:
  backend: TRTLLM
cuda_graph_config:
  enable_padding: true
  batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128
cache_transceiver_config:
  max_tokens_in_buffer: 131072
  backend: DEFAULT
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 3
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
print_iter_log: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

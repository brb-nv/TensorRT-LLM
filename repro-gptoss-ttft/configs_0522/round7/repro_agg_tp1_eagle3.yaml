# Round 7 (2026-05-22): identical to round6 agg baseline, included unchanged so
# the round7 configs_0522 dir is a self-contained reproduction set.
#
# Aggregated TP1 IFB Eagle3 baseline for gpt-oss-120b on B200.
# Used by: scripts/launch_agg.sh
backend: pytorch
tensor_parallel_size: 1
moe_expert_parallel_size: 1
pipeline_parallel_size: 1
enable_attention_dp: false
stream_interval: 20
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
cuda_graph_config:
  enable_padding: true
  max_batch_size: 1
kv_cache_config:
  dtype: fp8
  enable_block_reuse: true
  free_gpu_memory_fraction: 0.9
  event_buffer_max_size: 16384
moe_config:
  backend: TRTLLM
max_seq_len: 131072
max_batch_size: 1
max_num_tokens: 20000
num_postprocess_workers: 4
print_iter_log: true
enable_chunked_prefill: true
trust_remote_code: true
sampler_type: TorchSampler
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 3
  # Cookbook "Eagle3-next" = released nvidia/gpt-oss-120b-Eagle3-v3.
  # launch_agg.sh substitutes EAGLE_CKPT here.
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

# Disagg generation worker (1 GPU) for gpt-oss-120b TP1, Eagle3-next.
# Variant of repro_disagg_gen_tp1.yaml that matches the agg/ctx postproc and
# stream cadence so the IPC path is identical across all three workers:
#   - num_postprocess_workers: 0  -> 4   (match agg=4, ctx=4)
#   - stream_interval        : 100 -> 20 (match agg=20, ctx=20)
# Used to test whether the gen-side postproc-worker IPC and 5x denser SSE
# cadence change the client-vs-server TTFT gap on disagg.
#
# Used by: scripts/launch_disagg.sh when GEN_CONFIG_BASE=repro_disagg_gen_tp1_pp4_si20
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 512
max_seq_len: 131072
stream_interval: 20
trust_remote_code: true
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 4
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: true
moe_config:
  backend: TRTLLM
cuda_graph_config:
  enable_padding: true
  batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128
cache_transceiver_config:
  max_tokens_in_buffer: 131072
  backend: DEFAULT
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 3
  # "Eagle3-next" = pre-release name of nvidia/gpt-oss-120b-Eagle3-v3.
  # launch_disagg.sh substitutes EAGLE_CKPT here.
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
print_iter_log: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

# round4: same as round2 (round_robin proxy) plus per-request perf_metrics
# accounting on the disagg proxy so the joined per-stage TTFT breakdown is
# observable via GET /perf_metrics. The ctx/gen worker configs already declare
# return_perf_metrics: true and perf_metrics_max_requests: 20000.
hostname: localhost
port: 8000
backend: pytorch
# Required so DisaggPerfMetricsCollector keeps a non-zero deque; without this
# the proxy's /perf_metrics returns []. See
# tensorrt_llm/serve/perf_metrics.py::DisaggPerfMetricsCollector.
perf_metrics_max_requests: 20000
context_servers:
  num_instances: 1
  urls:
    - "localhost:8001"
generation_servers:
  num_instances: 1
  urls:
    - "localhost:8002"

name: Check Dynamo Imports
on:
  pull_request:
    paths:
      - 'tensorrt_llm/version.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-dynamo-imports:
    name: Verify Dynamo TRT-LLM import compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Clone Dynamo repo
        run: git clone --depth 1 https://github.com/ai-dynamo/dynamo.git /tmp/dynamo

      - name: Check Dynamo imports are in sync
        run: |
          python3 tests/unittest/api_stability/sync_dynamo_imports.py /tmp/dynamo || {
            echo ""
            echo "============================================================"
            echo "Dynamo's TRT-LLM imports have changed since the last sync."
            echo "Run locally to update:"
            echo ""
            echo "  python tests/unittest/api_stability/sync_dynamo_imports.py /path/to/dynamo --update"
            echo ""
            echo "Then commit the updated test_dynamo_imports.py."
            echo "============================================================"
            exit 1
          }

# SLURM Configuration
slurm:
  script_file: "disaggr_torch.slurm"
  partition: "gb200"
  account: "coreai_comparch_trtllm"
  job_time: "02:00:00"
  job_name: "nvbug5844149-con1-tep8-mtp3"
  extra_args: "" # Cluster specific arguments, e.g. "--gres=gpu:4 --exclude=node1,node2"
  set_segment: true # Optional: whether to set the segment for the job
  numa_bind: true # Only enable for GB200/GB300 NVL72

# Benchmark Mode
benchmark:
  mode: "gen_only"  # Options: e2e, gen_only, gen_only_no_context
  use_nv_sa_benchmark: false  # Whether to use NVIDIA SA benchmark script
  multi_round: 1  # Number of benchmark rounds
  benchmark_ratio: 1.0  # Benchmark ratio
  streaming: true  # Enable streaming mode
  concurrency_list: "1"
  input_length: 32768  # Input sequence length
  output_length: 4096  # Output sequence length
  dataset_file: "/lustre/fsw/coreai_comparch_trtllm/common/disagg_datasets/deepseek-v32-32768-4096-50000-ratio-1_for_serve.json"

# Hardware Configuration
hardware:
  gpus_per_node: 4  # Modify this with your hardware configuration
  num_ctx_servers: 1  # Number of context servers
  num_gen_servers: 1  # Number of generation servers

# Environment Configuration
environment:
  container_mount: "/lustre/fsw/coreai_comparch_trtllm:/lustre/fsw/coreai_comparch_trtllm"
  container_image: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/sqsh/trtllm_pytorch_26.02_py3_sbsa_ubuntu24.04_trt10.15.1.29_202604011104_12600.sqsh"
  model_path: "/lustre/fsw/coreai_comparch_trtllm/common/DeepSeek-V3.2-FP4-v2"
  trtllm_repo: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT-LLM"
  build_wheel: false  # Don't build the wheel when launching multiple jobs
  cuda_architectures: "100-real;103-real"  # Optional CUDA architectures to build for (e.g. "90-real;100-real"). If empty, builds for all architectures
  trtllm_wheel_path: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT-LLM/build/tensorrt_llm-1.3.0rc11-cp312-cp312-linux_aarch64.whl"  # Path to pre-built TensorRT-LLM wheel. If provided, install from this wheel instead
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes NCCL_GRAPH_MIXING_SUPPORT=0"
  server_env_var: "TRTLLM_SERVER_DISABLE_GC=1"

# Profiling Configuration
profiling:
  nsys_on: false  # Set to true to enable profiling
  ctx_profile_range: "10-30"  # Set TLLM_PROFILE_START_STOP for ctx workers
  gen_profile_range: "200-250"  # Set TLLM_PROFILE_START_STOP for gen workers

# Accuracy Configuration
accuracy:
  enable_accuracy_test: false  # Set to true to enable accuracy evaluation
  tasks:
    gsm8k:
      model: "local-completions"
      model_args_extra: "num_concurrent=512,max_retries=3,tokenized_requests=false,timeout=7200,max_gen_toks=16384"
      extra_kwargs:
        trust_remote_code: true

worker_config:
  gen:
    print_iter_log: true
    max_batch_size: 1
    max_num_tokens: 8
    max_input_len: 32784
    max_seq_len: 40960
    tensor_parallel_size: 8
    moe_expert_parallel_size: 8
    enable_attention_dp: false
    enable_lm_head_tp_in_adp: false
    pipeline_parallel_size: 1
    context_parallel_size: 1
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 1
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.25
      dtype: fp8
      tokens_per_block: 64
    moe_config:
      backend: TRTLLM
    cache_transceiver_config:
      max_tokens_in_buffer: 32832
      backend: UCX
    disable_overlap_scheduler: true
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    num_postprocess_workers: 4
    stream_interval: 20
    nvfp4_gemm_config:
      allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
    allreduce_strategy: MNNVL
  ctx:
    print_iter_log: true
    max_batch_size: 1
    max_num_tokens: 32784
    max_input_len: 32784
    max_seq_len: 32832
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    cuda_graph_config: null
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.4
      dtype: fp8
      tokens_per_block: 64
    moe_config:
      backend: CUTEDSL
    cache_transceiver_config:
      max_tokens_in_buffer: 32832
      backend: UCX
    disable_overlap_scheduler: true
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3

# SLURM Configuration
slurm:
  script_file: "disaggr_torch.slurm"
  partition: "gb300"
  account: "coreai_comparch_trtllm"
  job_time: "02:00:00"
  job_name: "coreai_comparch_trtllm-minimax_m3.benchmark"
  extra_args: "" # Cluster specific arguments, e.g. "--gres=gpu:4 --exclude=node1,node2"
  set_segment: true # Optional: whether to set the segment for the job
  numa_bind: true # Only enable for GB200/GB300 NVL72

# Benchmark Mode
benchmark:
  mode: "e2e"  # Options: e2e, gen_only, gen_only_no_context
  use_nv_sa_benchmark: true  # Whether to use NVIDIA SA benchmark script
  multi_round: 8  # Number of benchmark rounds
  benchmark_ratio: 0.8  # Benchmark ratio
  streaming: true  # Enable streaming mode
  concurrency_list: "16"
  input_length: 1024  # Input sequence length
  output_length: 1024  # Output sequence length
  dataset_file: ""

# Hardware Configuration
hardware:
  gpus_per_node: 4  # Modify this with your hardware configuration
  num_ctx_servers: 1  # Number of context servers
  num_gen_servers: 1  # Number of generation servers
  # compact_packing: false  # Opt-in: pack workers into the minimum number
  # of nodes and let two workers share a physical node when their GPU counts
  # straddle a node boundary (e.g. two TP=6 ctx workers in 3 four-GPU nodes
  # via 4+2 / 2+4). Only recommended on full-mesh NVLink fabrics like
  # GB200/GB300 NVL72 where cross-worker NVLink traffic on the shared node
  # is free; on PCIe / partitioned-NVLink hosts the shared node will
  # bottleneck and you should leave this off.

# Environment Configuration
environment:
  container_mount: "/lustre/fsw/coreai_comparch_trtllm:/lustre/fsw/coreai_comparch_trtllm"  # Format: path1:path1,path2:path2
  container_image: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/sqsh/tensorrt_llm_pytorch_26.04_py3_aarch64_ubuntu24.04_trt10.16.1.11_skip_tritondevel_202606261400_12643.sqsh"
  model_path: "/lustre/fsw/coreai_comparch_trtllm/tanmayv/models/MiniMax-M3-MXFP8"
  trtllm_repo: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT-LLM/"
  build_wheel: false  # Don't build the wheel when launching multiple jobs
  cuda_architectures: "100-real;103-real"  # Optional CUDA architectures to build for (e.g. "90-real;100-real"). If empty, builds for all architectures
  trtllm_wheel_path: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT-LLM/build/tensorrt_llm-1.3.0rc21-cp312-cp312-linux_aarch64.whl"  # Path to pre-built TensorRT-LLM wheel. If provided, install from this wheel instead
  work_dir: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT-LLM/examples/disaggregated/slurm/benchmark/"
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes NCCL_GRAPH_MIXING_SUPPORT=0"
  server_env_var: "TRTLLM_SERVER_DISABLE_GC=1"

# Profiling Configuration
profiling:
  nsys_on: true  # Set to true to enable profiling
  ctx_profile_range: "10-30"  # Set TLLM_PROFILE_START_STOP for ctx workers
  gen_profile_range: "200-250"  # Set TLLM_PROFILE_START_STOP for gen workers

# Accuracy Configuration
accuracy:
  enable_accuracy_test: false  # Set to true to enable accuracy evaluation
  tasks:
    gsm8k:
      model: "local-completions"  # Model type for lm_eval
      model_args_extra: "num_concurrent=512,max_retries=3,tokenized_requests=false,timeout=7200,max_gen_toks=16384"
      extra_kwargs:
        trust_remote_code: true

worker_config:
  gen:
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    enable_attention_dp: false
    enable_lm_head_tp_in_adp: false
    pipeline_parallel_size: 1
    context_parallel_size: 1
    # Uncomment this section to enable context parallelism.
    # cp_config:
    #   cp_type: "HELIX"
    #   tokens_per_block: 32  # must match kv_config.tokens_per_block.
    max_batch_size: 64
    max_num_tokens: 128
    max_seq_len: 2251
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
    print_iter_log: true
    trust_remote_code: true
    kv_cache_config:
      enable_block_reuse: false
      tokens_per_block: 32
      free_gpu_memory_fraction: 0.8
      dtype: fp8
    moe_config:
      backend: TRTLLM
      use_low_precision_moe_combine: true
    sparse_attention_config:
      algorithm: minimax_m3
      sparse_use_msa: true
    cache_transceiver_config:
      max_tokens_in_buffer: 4608
      backend: DEFAULT
      transceiver_runtime: PYTHON
    stream_interval: 20
    num_postprocess_workers: 4
  ctx:
    max_batch_size: 4
    max_num_tokens: 4608
    max_seq_len: 1227
    tensor_parallel_size: 4
    context_parallel_size: 1
    moe_expert_parallel_size: 4
    enable_attention_dp: true
    pipeline_parallel_size: 1
    print_iter_log: true
    trust_remote_code: true
    cuda_graph_config: null
    disable_overlap_scheduler: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.85
      dtype: fp8
    sparse_attention_config:
      algorithm: minimax_m3
      sparse_use_msa: true
    cache_transceiver_config:
      max_tokens_in_buffer: 4608
      backend: DEFAULT
      transceiver_runtime: PYTHON

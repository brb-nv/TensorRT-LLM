# Repro config for nvbug 5948878
# Based on: deepseek-r1-fp4_1k1k_ctx2_gen1_dep48_bs16_eplb288_mtp3_ccb-DEFAULT-temp.yaml

slurm:
  script_file: "disaggr_torch.slurm"
  partition: "gb300"
  account: "coreai_comparch_trtllm"
  job_time: "02:00:00"
  job_name: "coreai_comparch_trtllm-connection_reset.reset"
  extra_args: ""
  set_segment: true
  numa_bind: true

benchmark:
  mode: "gen_only"
  use_nv_sa_benchmark: false
  multi_round: 8
  benchmark_ratio: 0.8
  streaming: true
  concurrency_list: "12288"
  input_length: 1024
  output_length: 1024
  dataset_file: "/lustre/fsw/coreai_comparch_trtllm/common/disagg_datasets/deepseek-r1-1024-1024-100000-ratio-1_for_serve.json"

hardware:
  gpus_per_node: 4
  num_ctx_servers: 2
  num_gen_servers: 1

environment:
  container_mount: "/lustre/fsw/coreai_comparch_trtllm:/lustre/fsw/coreai_comparch_trtllm"
  container_image: "/lustre/fsw/coreai_comparch_trtllm/common/tensorrt-llm-202602261110-1170.sqsh"
  model_path: "/lustre/fsw/coreai_comparch_trtllm/common/DeepSeek-R1-0528-FP4-v2"
  trtllm_repo: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT_LLM_1.2"
  build_wheel: true
  cuda_architectures: "103-real"
  # trtllm_wheel_path: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT_LLM_1.2/build/tensorrt_llm-1.2.0-cp312-cp312-linux_aarch64.whl"
  trtllm_wheel_path: ""
  work_dir: "/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/TensorRT_LLM_1.2/examples/disaggregated/slurm/benchmark"
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes TRTLLM_KVCACHE_TIME_OUTPUT_PATH=/lustre/fsw/coreai_comparch_trtllm/bbuddharaju/kvcache_perf"
  server_env_var: "TRTLLM_SERVER_DISABLE_GC=1"

profiling:
  nsys_on: true
  ctx_profile_range: "10-30"
  gen_profile_range: "1000-1100"

accuracy:
  enable_accuracy_test: false
  model: "local-completions"
  tasks: "gsm8k"
  model_args_extra: "num_concurrent=512,max_retries=3,tokenized_requests=false,timeout=1200,max_gen_toks=256,max_length=4096"

worker_config:
  gen:
    enable_layerwise_nvtx_marker: true
    tensor_parallel_size: 48
    moe_expert_parallel_size: 48
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    pipeline_parallel_size: 1
    max_batch_size: 256
    max_num_tokens: 256
    max_seq_len: 2176
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.7
      dtype: fp8
    moe_config:
      backend: WIDEEP
      load_balancer:
        num_slots: 288
        layer_updates_per_iter: 1
    cache_transceiver_config:
      max_tokens_in_buffer: 8320
      backend: UCX
    stream_interval: 20
    num_postprocess_workers: 4
    trust_remote_code: true
  ctx:
    enable_layerwise_nvtx_marker: true
    max_batch_size: 4
    max_num_tokens: 4480
    max_seq_len: 2176
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    enable_attention_dp: true
    pipeline_parallel_size: 1
    print_iter_log: true
    cuda_graph_config: null
    trust_remote_code: true
    disable_overlap_scheduler: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.85
      dtype: fp8
    cache_transceiver_config:
      max_tokens_in_buffer: 8320
      backend: UCX

# Dynamo recipe: Qwen3-32B-FP8 disaggregated (prefill worker)
# Source: https://github.com/ai-dynamo/dynamo/blob/main/recipes/qwen3-32b-fp8/trtllm/disagg/deploy.yaml
# GPU topology: 4x prefill workers (1 GPU each) + 2x decode workers (2 GPUs each) = 8 GPUs total
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
enable_attention_dp: false
enable_chunked_prefill: false
max_batch_size: 1
max_num_tokens: 7808
max_seq_len: 7808
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.7
dtype: fp8
cache_transceiver_config:
  backend: DEFAULT
cuda_graph_config:
  enable_padding: true
  batch_sizes:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 128
    - 256
disable_overlap_scheduler: true
print_iter_log: false

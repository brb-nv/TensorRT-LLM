# Dynamo recipe: Qwen3-32B-FP8 aggregated
# Source: https://github.com/ai-dynamo/dynamo/blob/main/recipes/qwen3-32b-fp8/trtllm/agg/deploy.yaml
# GPU topology: 2x H100/H200/A100
backend: pytorch
tensor_parallel_size: 2
pipeline_parallel_size: 1
enable_attention_dp: false
enable_chunked_prefill: false
max_batch_size: 96
max_num_tokens: 7964
max_seq_len: 7964
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.7
dtype: fp8
cuda_graph_config:
  enable_padding: true
  batch_sizes:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 96
disable_overlap_scheduler: false
print_iter_log: false

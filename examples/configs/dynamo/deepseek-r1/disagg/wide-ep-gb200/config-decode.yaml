# Dynamo recipe: DeepSeek-R1 disaggregated WideEP (decode worker)
# Source: https://github.com/ai-dynamo/dynamo/blob/main/recipes/deepseek-r1/trtllm/disagg/wide_ep/gb200/deploy.yaml
# GPU topology: 1x prefill node (4 GPUs, DEP4) + 8x decode nodes (4 GPUs each, DEP32) = 36 GB200 GPUs
tensor_parallel_size: 32
moe_expert_parallel_size: 32
enable_attention_dp: true
pipeline_parallel_size: 1
max_batch_size: 32
max_num_tokens: 32
max_seq_len: 2251
cuda_graph_config:
  enable_padding: true
  batch_sizes:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 128
    - 256
    - 384
    - 512
    - 768
    - 1024
    - 2048
print_iter_log: true
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.7
  dtype: fp8
moe_config:
  backend: WIDEEP
cache_transceiver_config:
  max_tokens_in_buffer: 4608
  backend: DEFAULT
stream_interval: 20

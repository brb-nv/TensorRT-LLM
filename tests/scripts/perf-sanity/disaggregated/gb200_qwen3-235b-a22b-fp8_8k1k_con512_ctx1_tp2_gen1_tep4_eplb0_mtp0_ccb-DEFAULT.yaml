metadata:
  model_name: qwen3_235b_a22b_fp8
  precision: fp8
  model_dir_name: Qwen3-235B-A22B-FP8
  supported_gpus:
  - GB200
  script_file: disaggr_torch.slurm
  benchmark_type: 8k1k
  # Mirror of the Dynamo Qwen3-235B-A22B-FP8 TRT-LLM disagg deployment recipe:
  # https://github.com/ai-dynamo/dynamo/tree/main/recipes/qwen3-235b-a22b-fp8/trtllm/disagg
  # Topology: 1 prefill worker on 2 GPUs (TP=2, MoE-TP=2, MoE-EP=1, no AttnDP)
  #         + 1 decode worker on 4 GPUs (TP=4, MoE-EP=4, MoE-TP=1, no AttnDP).
  # MoE backend is DEEPGEMM on both workers, cache transceiver is DEFAULT,
  # KV cache dtype is fp8, prefill enables block reuse and decode disables it.
  # Goal: catch TRT-LLM regressions that would only surface in the production
  # Dynamo Qwen3-235B-A22B-FP8 disagg deployment (DEEPGEMM MoE, FP8 KV cache on
  # both workers, overlap scheduler on decode / off on prefill, TP2+EP1 prefill
  # with TP1+EP4 decode).
  #
  # Deviations from the upstream Dynamo recipe (intentional, revisit if the
  # recipe itself changes or if perf-sanity grows to support these knobs):
  #   TODO(dynamo-replica): ISL/OSL not pinned by the recipe. The recipe only
  #     sets max_seq_len=8192 on both workers. We use 8192/1024 to reuse the
  #     existing `qwen3_235b-8k1k-20480-ratio-1_for_serve.json` perf-ci dataset
  #     (same workload as the FP4 235B entry) and to stay within the recipe's
  #     max_seq_len budget (8k input + 1k output = 9216 > 8192; we rely on the
  #     dataset being capped at max_seq_len by the benchmark harness, which
  #     matches the existing FP4 235B 8k1k entry). If a stricter FP8 dataset
  #     (e.g. 7k1k) appears, switch to it.
  #   TODO(dynamo-replica): concurrency_list='512' is a perf-sanity choice
  #     (no concurrency is specified in deploy.yaml). Picked to saturate the
  #     decode `max_batch_size=512` at 1x with no backlog, which is a good
  #     steady-state point for regression detection.
  #   TODO(dynamo-replica): `gen_only` benchmark_mode only. Matches the
  #     convention used by every disagg entry in perf-sanity; the `e2e`
  #     variant is left commented-out in the test-list for easy re-enable.
  #   TODO(dynamo-replica): Upstream recipe runs 6 prefill + 1 decode replicas
  #     behind a KV-aware router (`--router-mode kv`). Perf-sanity does not
  #     model multi-replica fan-out or KV routing, so we run 1 ctx + 1 gen.
  #     Sufficient for per-worker regression detection; will NOT catch
  #     regressions in the router / event plane / cross-replica KV reuse.
  #   TODO(dynamo-replica): The recipe's prefill CLI sets
  #     `--max-batch-size 2 --max-num-tokens 8192 --max-seq-len 8192` and
  #     decode CLI sets `--max-batch-size 512 --max-num-tokens 1024
  #     --max-seq-len 8192`. These CLI overrides are mapped into the
  #     worker_config block below. The `--max-num-tokens 1024` on decode
  #     intentionally overrides the engine yaml's `max_num_tokens: 8192`
  #     (CLI wins in Dynamo), so we reflect the effective (post-CLI) value.
  #   TODO(dynamo-replica): Kubernetes-only recipe env vars (`HF_HOME`,
  #     `MODEL_PATH`, `ENGINE_ARGS`) are omitted - they don't apply to
  #     SLURM/enroot. The recipe does not set any TRT-LLM-specific env vars
  #     beyond the config file, so the perf-sanity env var block uses only
  #     the standard knobs (`TRTLLM_ENABLE_PDL`, GC disable, etc.).
slurm:
  script_file: disaggr_torch.slurm
  partition: <partition>
  account: <account>
  job_time: 02:00:00
  job_name: unified-benchmark
  extra_args: "--gres=gpu:4"
  numa_bind: true
benchmark:
  mode: e2e
  use_nv_sa_benchmark: false
  multi_round: 10
  benchmark_ratio: 0.0
  streaming: true
  concurrency_list: '512'
  input_length: 8192
  output_length: 1024
  dataset_file: datasets/perf-ci/qwen3_235b-8k1k-20480-ratio-1_for_serve.json
hardware:
  gpus_per_node: 4
  num_ctx_servers: 1
  num_gen_servers: 1
environment:
  container_mount: <container_mount>
  container_image: <container_image>
  model_path: <model_path>
  trtllm_repo: ''
  build_wheel: false
  work_dir: <full_path_to_work_dir>
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes"
  server_env_var: "TRTLLM_SERVER_DISABLE_GC=1"
profiling:
  nsys_on: false
accuracy:
  enable_accuracy_test: false
worker_config:
  gen:
    print_iter_log: true
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    moe_tensor_parallel_size: 1
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: false
    trust_remote_code: true
    max_batch_size: 512
    max_num_tokens: 1024
    max_seq_len: 8192
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 512
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.95
      dtype: fp8
    moe_config:
      backend: DEEPGEMM
    cache_transceiver_config:
      backend: DEFAULT
    disable_overlap_scheduler: false
  ctx:
    print_iter_log: true
    tensor_parallel_size: 2
    moe_expert_parallel_size: 1
    moe_tensor_parallel_size: 2
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: false
    trust_remote_code: true
    max_batch_size: 2
    max_num_tokens: 8192
    max_seq_len: 8192
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 2
    kv_cache_config:
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.7
      dtype: fp8
    moe_config:
      backend: DEEPGEMM
    cache_transceiver_config:
      backend: DEFAULT
    disable_overlap_scheduler: true

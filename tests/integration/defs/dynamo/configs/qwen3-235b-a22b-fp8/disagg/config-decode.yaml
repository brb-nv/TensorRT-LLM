# Dynamo recipe: Qwen3-235B-A22B-FP8 disaggregated (decode worker)
# Source: https://github.com/ai-dynamo/dynamo/blob/main/recipes/qwen3-235b-a22b-fp8/trtllm/disagg/deploy.yaml
# GPU topology: 6x prefill workers (2 GPUs each, TP2) + 1x decode worker (4 GPUs, TP4×EP4) = 16 GPUs total
backend: pytorch
trust_remote_code: true
tensor_parallel_size: 4
moe_expert_parallel_size: 4
moe_tensor_parallel_size: 1
enable_attention_dp: false
enable_chunked_prefill: false
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.95
dtype: fp8
cache_transceiver_config:
  backend: DEFAULT
cuda_graph_config:
  enable_padding: true
max_batch_size: 512
disable_overlap_scheduler: false
print_iter_log: false
moe_config:
  backend: DEEPGEMM
max_num_tokens: 8192

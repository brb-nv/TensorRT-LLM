version: 0.0.1
l0_gb200_multi_nodes_perf_sanity_ctx1_node1_gpu2_gen1_node1_gpu4:
- condition:
    ranges:
      # 1 ctx worker with each 1 node and 2 GPUs
      # 1 gen worker with each 1 node and 4 GPUs
      system_gpu_count:
        gte: 8
        lte: 8
    wildcards:
      gpu:
      - '*gb200*'
    terms:
      stage: post_merge
      backend: pytorch
  tests:
  # Dynamo Qwen3-235B-A22B-FP8 TRT-LLM disagg recipe replica
  # (TP2 MoE-TP2 EP1 prefill + TP4 EP4 decode, DEEPGEMM MoE, ccb-DEFAULT)
  # Mirrors https://github.com/ai-dynamo/dynamo/tree/main/recipes/qwen3-235b-a22b-fp8/trtllm/disagg
  - perf/test_perf_sanity.py::test_e2e[disagg_upload-gen_only-gb200_qwen3-235b-a22b-fp8_8k1k_con512_ctx1_tp2_gen1_tep4_eplb0_mtp0_ccb-DEFAULT] TIMEOUT (120)
  # - perf/test_perf_sanity.py::test_e2e[disagg_upload-e2e-gb200_qwen3-235b-a22b-fp8_8k1k_con512_ctx1_tp2_gen1_tep4_eplb0_mtp0_ccb-DEFAULT] TIMEOUT (120)

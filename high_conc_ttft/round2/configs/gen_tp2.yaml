#
# Round1 disagg GENERATION worker (decode) for gpt-oss-120b, TP2.
# 2 identical copies of this worker run on GPU groups {3,4} and {5,6}
# (ports 8004/8005).
#
# Faithful copy of the runtime config that produced NVBug 6266370, captured at:
#   high_conc_ttft/from_pei/run_benchx_3ctx2gen_tp2_dynamo_kvrouter_hcon_c160_.../gen.yaml
# (job_info.txt: REMOVE_TORCH_COMPILE_GEN=1). No torch.compile on gen in the
# Dynamo run, so torch_compile_config is intentionally omitted.
#
# Observability-only additions vs the bug run: return_perf_metrics / *_max_*.
#
# EAGLE_CKPT_PLACEHOLDER is sed-substituted by scripts/launch_disagg_3ctx2gen.sh.
backend: pytorch
# Force plain NCCL allreduce instead of the custom tunable allreduce kernel,
# which wedges during TP2 warmup on this node (NCCL init succeeds -- rings/trees
# connected -- but the custom fallback collective hangs). NCCL is proven healthy
# here, so this should unblock startup.
allreduce_strategy: NCCL
tensor_parallel_size: 2
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 512
max_seq_len: 131072
stream_interval: 10
trust_remote_code: true
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 4
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: true
moe_config:
  backend: TRTLLM
cuda_graph_config:
  enable_padding: true
  batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 24
  - 32
  - 40
  - 56
  - 64
  - 128
cache_transceiver_config:
  max_tokens_in_buffer: 131072
  backend: DEFAULT
speculative_config:
  decoding_type: Eagle
  max_draft_len: 3
  speculative_model: EAGLE_CKPT_PLACEHOLDER
  eagle3_one_model: true
  eagle3_layers_to_capture:
  - 23
  - 29
  - 35
enable_iter_perf_stats: true
enable_iter_req_stats: true
print_iter_log: true
return_perf_metrics: true
perf_metrics_max_requests: 20000
iter_stats_max_iterations: 20000
request_stats_max_iterations: 20000

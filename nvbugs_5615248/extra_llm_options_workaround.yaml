# NVBug 5615248 — workaround case (max_seq_len=129).
#
# Per Thor Johnsen's comment #18: round max_seq_len up to nearest power of two
# and add 1. With max_seq_len=129, the warmup at num_tokens=128 succeeds
# (since max_seq_len - 1 = 128 >= 128), so a CUDA graph for 128 is recorded
# and any prefill with ISL <= 128 is padded to 128 and runs piecewise instead
# of falling back to eager.

backend: pytorch

tensor_parallel_size: 1
pipeline_parallel_size: 1

max_beam_width: 10
max_batch_size: 1
max_seq_len: 129

enable_chunked_prefill: true

cuda_graph_config:
  max_batch_size: 128
  enable_padding: true

kv_cache_config:
  enable_block_reuse: true

torch_compile_config:
  enable_piecewise_cuda_graph: true
